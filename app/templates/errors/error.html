{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}

{% block fullscreen %}
<div class="auth-shell">
  <div class="auth-card">
    <h1>Error {{ code }}</h1>
    <p class="auth-sub">{{ message }}</p>
    <a href="{{ url_for('web.index') }}" class="btn btn-primary btn-block">Go home</a>
  </div>
</div>
{% endblock %}

{% block content %}
<section class="panel">
  <h1>Error {{ code }}</h1>
  <p class="muted">{{ message }}</p>
  <a href="{{ url_for('web.dashboard') }}" class="btn btn-secondary">Back to dashboard</a>
</section>
{% endblock %}
